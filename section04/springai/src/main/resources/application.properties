spring.application.name=springai
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
spring.ai.model.chat=ollama
spring.ai.ollama.chat.options.model=llama3.2:1b

# --- Conversation memory: file-based H2 so history survives app restarts ---
spring.datasource.url=jdbc:h2:file:~/chatmemory;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Run the chat-memory schema on startup; the H2 DDL below is idempotent (CREATE ... IF NOT EXISTS).
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.schema=classpath:/schema/schema-h2db.sql

# Watch the conversation history being stitched into each prompt.
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
